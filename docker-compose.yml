version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: alumnihub-db
    environment:
      POSTGRES_USER: alumnihub
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: alumnihub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alumnihub -d alumnihub"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: alumnihub-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alumnihub-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/alumnihub
      - SPRING_DATASOURCE_USERNAME=alumnihub
      - SPRING_DATASOURCE_PASSWORD=password123
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=alumnihub_production_secure_jwt_secret_token_123_456_789
      - CLOUDINARY_CLOUD_NAME=dummy_name
      - CLOUDINARY_API_KEY=dummy_key
      - CLOUDINARY_API_SECRET=dummy_secret
      - FIREBASE_PROJECT_ID=dummy_firebase_project
      - FIREBASE_CLIENT_EMAIL=dummy_firebase_email
      - FIREBASE_PRIVATE_KEY=dummy_firebase_private_key
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8080
    container_name: alumnihub-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
