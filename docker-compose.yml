version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: alumnihub-db

    restart: unless-stopped

    environment:
      POSTGRES_USER: alumnihub
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: alumnihub

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U alumnihub -d alumnihub" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: alumnihub-redis

    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: alumnihub-backend

    restart: unless-stopped

    env_file:
      - .env

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/alumnihub
      SPRING_DATASOURCE_USERNAME: alumnihub
      SPRING_DATASOURCE_PASSWORD: password123

      REDIS_HOST: redis
      REDIS_PORT: 6379

    ports:
      - "8080:8080"

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

    healthcheck:
      test: [ "CMD", "wget", "--spider", "--quiet", "http://localhost:8080/api/health" ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}

    container_name: alumnihub-frontend

    restart: unless-stopped

    ports:
      - "3000:3000"

    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
